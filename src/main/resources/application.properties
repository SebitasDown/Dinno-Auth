spring.application.name=Auth

# Error Handling (Problem Details)
spring.webflux.problemdetails.enabled=true

# R2DBC settings
spring.r2dbc.url=r2dbc:postgresql://localhost:5432/auth_db
spring.r2dbc.username=dinno_user
spring.r2dbc.password=dinno_password

# Flyway settings
spring.flyway.enabled=true
spring.flyway.url=jdbc:postgresql://localhost:5432/auth_db
spring.flyway.user=dinno_user
spring.flyway.password=dinno_password
spring.flyway.baseline-on-migrate=true

# JWT
jwt.secret=MySecretKeyThatMustBeVeryLongAndSecureEnoughForHS256Algorithm
jwt.expiration=900
jwt.refresh-expiration=86400
