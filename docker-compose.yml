version: "3.8"
services:
  postgres:
    image: postgres:15-alpine
    container_name: auth-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: dinno_user
      POSTGRES_PASSWORD: dinno_password
      POSTGRES_DB: auth_db
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
