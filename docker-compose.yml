services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - SPRING_R2DBC_URL=r2dbc:postgresql://postgres:5432/auth_db
      - SPRING_R2DBC_USERNAME=dinno_user
      - SPRING_R2DBC_PASSWORD=dinno_password
      - SPRING_FLYWAY_URL=jdbc:postgresql://postgres:5432/auth_db
      - SPRING_FLYWAY_USER=dinno_user
      - SPRING_FLYWAY_PASSWORD=dinno_password
    depends_on:
      - postgres

  postgres:
    image: postgres:15-alpine
    container_name: auth-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: dinno_user
      POSTGRES_PASSWORD: dinno_password
      POSTGRES_DB: auth_db
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
